<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMUKO Fluid - Background Layer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1f;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        // Vector Module
        var Vector;
        (function (Vector) {
            "use strict";
            var Vec3 = function (x, y, z) {
                this.x = x;
                this.y = y;
                this.z = z;
            };
            Object.defineProperty(Vec3, "I", {
                get: function () { return new Vec3(1, 0, 0); }
            });
            Object.defineProperty(Vec3, "J", {
                get: function () { return new Vec3(0, 1, 0); }
            });
            Object.defineProperty(Vec3, "K", {
                get: function () { return new Vec3(0, 0, 1); }
            });
            Vec3.prototype.add = function (v) {
                if (v instanceof Vec3) {
                    this.x += v.x;
                    this.y += v.y;
                    this.z += v.z;
                } else {
                    this.x += v;
                    this.y += v;
                    this.z += v;
                }
                return this;
            };
            Vec3.prototype.sub = function (v) {
                if (v instanceof Vec3) {
                    this.x -= v.x;
                    this.y -= v.y;
                    this.z -= v.z;
                } else {
                    this.x -= v;
                    this.y -= v;
                    this.z -= v;
                }
                return this;
            };
            Vec3.prototype.clone = function () {
                return new Vec3(this.x, this.y, this.z);
            };
            Vec3.prototype.rotateX = function (angle) {
                var y = this.y;
                var z = this.z;
                this.y = y * Math.cos(angle) - z * Math.sin(angle);
                this.z = z * Math.cos(angle) + y * Math.sin(angle);
                return this;
            };
            Vec3.prototype.rotateY = function (angle) {
                var x = this.x;
                var z = this.z;
                this.x = x * Math.cos(angle) - z * Math.sin(angle);
                this.z = z * Math.cos(angle) + x * Math.sin(angle);
                return this;
            };
            Vec3.prototype.rotateZ = function (angle) {
                var x = this.x;
                var y = this.y;
                this.x = x * Math.cos(angle) - y * Math.sin(angle);
                this.y = y * Math.cos(angle) + x * Math.sin(angle);
                return this;
            };
            Vector["Vec3"] = Vec3;
        })(typeof Vector === "undefined" ? (Vector = {}) : Vector);

        // HemiSphere (condensed)
        var HemiSphere = function ({ origin, radius, detail }) {
            this.origin = origin || new Vector.Vec3(0, 0, 0);
            this.radius = radius || 50;
            this.vertices = [];
            this.detail = detail || 10;
            this.faces = [];
            this.normals = [];
            this.init();
        };

        HemiSphere.prototype.init = function () {
            var vertices = this.vertices;
            var faces = this.faces;
            var normals = this.normals;
            var radius = this.radius;
            var detail = this.detail;

            for (var i = 0; i < detail; i++) {
                var theta = (Math.PI * i) / detail;
                for (var j = 0; j < detail; j++) {
                    var phi = (Math.PI * j) / detail;
                    vertices.push(
                        radius * Math.sin(theta) * Math.cos(phi),
                        radius * Math.sin(theta) * Math.sin(phi),
                        radius * Math.cos(theta)
                    );
                }
            }

            for (var i = 0; i < detail - 1; i++) {
                for (var j = 0; j < detail - 1; j++) {
                    var a = i * detail + j;
                    var b = (i + 1) * detail + j;
                    var c = (i + 1) * detail + (j + 1);
                    var d = i * detail + (j + 1);
                    faces.push(a, b, c, a, c, d);
                }
            }

            for (var i = 0; i < detail; i++) {
                var theta = (Math.PI * i) / detail;
                for (var j = 0; j < detail; j++) {
                    var phi = (Math.PI * j) / detail;
                    normals.push(
                        Math.sin(theta) * Math.cos(phi),
                        Math.sin(theta) * Math.sin(phi),
                        Math.cos(theta)
                    );
                }
            }
        };

        HemiSphere.prototype.drawWireframe = function (context) {
            var faces = this.faces;
            var vertices = this.vertices;
            var origin = this.origin;

            context.strokeStyle = "#667eea";
            context.lineWidth = 1;
            context.globalAlpha = 0.6;

            for (var i = 0; i < faces.length; i += 3) {
                var a = faces[i];
                var b = faces[i + 1];
                var c = faces[i + 2];

                var v1x = vertices[a * 3] + origin.x;
                var v1y = vertices[a * 3 + 1] + origin.y;
                var v2x = vertices[b * 3] + origin.x;
                var v2y = vertices[b * 3 + 1] + origin.y;
                var v3x = vertices[c * 3] + origin.x;
                var v3y = vertices[c * 3 + 1] + origin.y;

                context.beginPath();
                context.moveTo(v1x, v1y);
                context.lineTo(v2x, v2y);
                context.lineTo(v3x, v3y);
                context.lineTo(v1x, v1y);
                context.stroke();
            }

            context.globalAlpha = 1;
        };

        HemiSphere.prototype.rotateX = function (angle) {
            var vertices = this.vertices;
            for (var i = 0; i < vertices.length; i += 3) {
                var y = vertices[i + 1];
                var z = vertices[i + 2];
                vertices[i + 1] = y * Math.cos(angle) - z * Math.sin(angle);
                vertices[i + 2] = z * Math.cos(angle) + y * Math.sin(angle);
            }
        };

        HemiSphere.prototype.rotateY = function (angle) {
            var vertices = this.vertices;
            for (var i = 0; i < vertices.length; i += 3) {
                var x = vertices[i];
                var z = vertices[i + 2];
                vertices[i] = x * Math.cos(angle) - z * Math.sin(angle);
                vertices[i + 2] = z * Math.cos(angle) + x * Math.sin(angle);
            }
        };

        // Setup canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Create background sphere
        const sphere = new HemiSphere({
            radius: 180,
            origin: new Vector.Vec3(window.innerWidth / 2, window.innerHeight / 2, 0),
            detail: 14
        });

        // Animation loop
        function animate() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(15, 15, 31, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Rotate sphere
            sphere.rotateY(0.0015);
            sphere.rotateX(0.0008);

            // Draw wireframe
            sphere.drawWireframe(ctx);

            requestAnimationFrame(animate);
        }

        animate();

        // Expose for parent communication
        window.mmuko = {
            setSphere: function (sphere) {
                this.sphere = sphere;
            },
            getState: function () {
                return { time: Date.now() };
            }
        };
    </script>
</body>
</html>
