<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMUKO Fluid - Foreground Layer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        // Particle system for foreground
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.age = 0;
                this.life = Math.random() * 100 + 50;
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.age++;
            }

            draw(ctx) {
                const alpha = 1 - (this.age / this.life);
                ctx.fillStyle = `rgba(102, 126, 234, ${alpha * 0.6})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            isDead() {
                return this.age >= this.life;
            }
        }

        // Drift indicator particle burst
        class DriftBurst {
            constructor(x, y, color) {
                this.particles = [];
                this.color = color;
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 * i) / 8;
                    const speed = 2 + Math.random() * 2;
                    const p = new Particle(x, y);
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    p.color = color;
                    this.particles.push(p);
                }
            }

            update() {
                this.particles = this.particles.filter(p => !p.isDead());
                this.particles.forEach(p => p.update());
            }

            draw(ctx) {
                this.particles.forEach(p => {
                    const alpha = 1 - (p.age / p.life);
                    ctx.fillStyle = this.color.replace('rgb', 'rgba').replace(')', `, ${alpha})`);
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            isDone() {
                return this.particles.length === 0;
            }
        }

        // Starfield
        class Starfield {
            constructor(count = 50) {
                this.stars = [];
                this.centerX = window.innerWidth / 2;
                this.centerY = window.innerHeight / 2;
                this.count = count;
                this.time = 0;

                for (let i = 0; i < count; i++) {
                    this.stars.push({
                        index: i,
                        distance: Math.random() * 400 + 200
                    });
                }
            }

            update(time) {
                this.time = time;
            }

            draw(ctx) {
                for (let i = 0; i < this.count; i++) {
                    const angle = (this.time * 0.0001 + i) % (Math.PI * 2);
                    const distance = this.stars[i].distance + Math.sin(this.time * 0.001 + i) * 30;
                    const x = this.centerX + Math.cos(angle) * distance;
                    const y = this.centerY + Math.sin(angle) * distance;

                    const size = 1 + Math.sin(this.time * 0.003 + i * 10) * 0.5;
                    const opacity = 0.2 + Math.sin(this.time * 0.002 + i * 5) * 0.4;

                    ctx.fillStyle = `rgba(102, 126, 234, ${opacity})`;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Setup canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Initialize effects
        const starfield = new Starfield(60);
        const bursts = [];
        const particles = [];

        // Emit particles periodically
        const emitterInterval = setInterval(() => {
            const x = window.innerWidth / 2 + (Math.random() - 0.5) * 400;
            const y = window.innerHeight / 2 + (Math.random() - 0.5) * 400;
            const p = new Particle(x, y);
            particles.push(p);
        }, 50);

        let time = 0;

        // Animation loop
        function animate() {
            time = Date.now();

            // Clear with subtle fade
            ctx.fillStyle = 'rgba(15, 15, 31, 0.03)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw starfield
            starfield.update(time);
            starfield.draw(ctx);

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Update and draw bursts
            for (let i = bursts.length - 1; i >= 0; i--) {
                bursts[i].update();
                bursts[i].draw(ctx);
                if (bursts[i].isDone()) {
                    bursts.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        // Expose for parent communication
        window.mmuko = window.mmuko || {};
        window.mmuko.burstAt = function (x, y, color) {
            bursts.push(new DriftBurst(x, y, color));
        };
        window.mmuko.setDriftColor = function (color) {
            // Can be used to change starfield color
        };
    </script>
</body>
</html>
