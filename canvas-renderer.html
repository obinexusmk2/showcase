<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMUKO Fluid - Canvas Renderer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #mainCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>

    <!-- Controls -->
    <div class="controls">
        <button class="control-btn active" onclick="switchTheme('redYellow')">Red/Yellow</button>
        <button class="control-btn" onclick="switchTheme('greenYellow')">Green/Yellow</button>
        <button class="control-btn" onclick="switchTheme('blueYellow')">Blue/Yellow</button>
        <button class="control-btn" onclick="captureFrame()">Capture Frame</button>
        <button class="control-btn" onclick="toggleUI()">Toggle UI</button>
    </div>

    <!-- FPS Counter -->
    <div class="fps-counter">
        FPS: <span id="fpsCounter">60</span>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <div><strong>Theme:</strong> <span id="themeLabel">Red/Yellow</span></div>
        <div><strong>Drift State:</strong> <span id="driftLabel">LOADING</span></div>
        <div><strong>Resolution:</strong> <span id="resLabel">1920x1080</span></div>
        <div style="margin-top: 10px; font-size: 0.8rem; opacity: 0.7;">
            Canvas-based UI rendering with toDataURL capture
        </div>
    </div>

    <script>
        // ============= COLOR THEMES =============
        const themes = {
            redYellow: {
                primary: '#ef4444',      // Red
                secondary: '#eab308',    // Yellow
                accent: '#f97316',       // Orange
                background: '#0f0f1f',
                text: '#ffffff',
                grid: 'rgba(239, 68, 68, 0.2)'
            },
            greenYellow: {
                primary: '#22c55e',      // Green
                secondary: '#eab308',    // Yellow
                accent: '#10b981',       // Emerald
                background: '#0f0f1f',
                text: '#ffffff',
                grid: 'rgba(34, 197, 94, 0.2)'
            },
            blueYellow: {
                primary: '#3b82f6',      // Blue
                secondary: '#eab308',    // Yellow
                accent: '#06b6d4',       // Cyan
                background: '#0f0f1f',
                text: '#ffffff',
                grid: 'rgba(59, 130, 246, 0.2)'
            }
        };

        let currentTheme = 'redYellow';
        let showUI = true;
        let frameCount = 0;
        let lastTime = Date.now();
        let fps = 60;

        // ============= CANVAS SETUP =============
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============= UI RENDERER =============
        class CanvasUIRenderer {
            constructor(ctx, theme) {
                this.ctx = ctx;
                this.theme = themes[theme];
                this.driftState = 'RED';
                this.driftDescription = 'Moving away from observer';
            }

            setTheme(themeName) {
                this.theme = themes[themeName];
            }

            drawGradientBackground() {
                const gradient = this.ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#0f0f1f');
                gradient.addColorStop(0.5, '#1a1a2e');
                gradient.addColorStop(1, '#0f0f1f');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            drawGrid() {
                this.ctx.strokeStyle = this.theme.grid;
                this.ctx.lineWidth = 0.5;
                const gridSize = 50;

                for (let x = 0; x < canvas.width; x += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, canvas.height);
                    this.ctx.stroke();
                }

                for (let y = 0; y < canvas.height; y += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(canvas.width, y);
                    this.ctx.stroke();
                }
            }

            drawHeader() {
                const headerHeight = 80;

                // Header background with alpha
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                this.ctx.fillRect(0, 0, canvas.width, headerHeight);

                // Header border
                this.ctx.strokeStyle = this.theme.primary;
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(0, 0, canvas.width, headerHeight);

                // Logo
                this.ctx.fillStyle = this.theme.primary;
                this.ctx.font = 'bold 28px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('🌀 MMUKO Fluid', 30, 50);

                // Tagline
                this.ctx.font = '14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.fillStyle = this.theme.secondary;
                this.ctx.fillText('Phenomenological Drift System', canvas.width - 350, 50);
            }

            drawDriftIndicator() {
                const panelWidth = 300;
                const panelHeight = 150;
                const x = canvas.width - panelWidth - 20;
                const y = 100;

                // Panel background
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                this.ctx.fillRect(x, y, panelWidth, panelHeight);

                // Panel border with theme color
                this.ctx.strokeStyle = this.theme.primary;
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(x, y, panelWidth, panelHeight);

                // Title
                this.ctx.fillStyle = this.theme.secondary;
                this.ctx.font = 'bold 14px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('DRIFT STATE', x + 15, y + 25);

                // Drift state label
                this.ctx.fillStyle = this.theme.primary;
                this.ctx.font = 'bold 32px monospace';
                this.ctx.fillText(this.driftState, x + 15, y + 70);

                // Description
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                this.ctx.font = '12px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.fillText(this.driftDescription, x + 15, y + 100);

                // Swatch
                this.ctx.fillStyle = this.theme.primary;
                this.ctx.beginPath();
                this.ctx.arc(x + panelWidth - 30, y + 60, 15, 0, Math.PI * 2);
                this.ctx.fill();

                // Glow effect
                this.ctx.strokeStyle = this.theme.primary;
                this.ctx.lineWidth = 1;
                this.ctx.globalAlpha = 0.3;
                this.ctx.beginPath();
                this.ctx.arc(x + panelWidth - 30, y + 60, 25, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.globalAlpha = 1;
            }

            drawFeatures() {
                const panelWidth = 280;
                const panelHeight = 180;
                const x = 20;
                const y = canvas.height - panelHeight - 20;

                // Panel background
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                this.ctx.fillRect(x, y, panelWidth, panelHeight);

                // Panel border
                this.ctx.strokeStyle = this.theme.secondary;
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(x, y, panelWidth, panelHeight);

                // Title
                this.ctx.fillStyle = this.theme.secondary;
                this.ctx.font = 'bold 14px monospace';
                this.ctx.textAlign = 'left';
                this.ctx.fillText('FEATURES', x + 15, y + 25);

                // Features
                const features = [
                    '⚡ Motion Classification',
                    '🎯 Weighted Interpolation',
                    '🔮 Phenomenological'
                ];

                this.ctx.font = '11px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';

                features.forEach((feature, i) => {
                    this.ctx.fillText(feature, x + 15, y + 50 + i * 35);
                });
            }

            drawHeroText() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                // Main heading
                this.ctx.fillStyle = this.theme.primary;
                this.ctx.font = 'bold 52px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Drift Visualization', centerX, centerY - 40);

                // Subheading
                this.ctx.fillStyle = this.theme.secondary;
                this.ctx.font = '18px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.fillText('Real-time R³ state classification', centerX, centerY + 30);

                // Description
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                this.ctx.font = '14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.fillText('Weighted graph visualization with observer-frame analysis', centerX, centerY + 65);
            }

            drawButton(x, y, width, height, text) {
                // Button background
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                this.ctx.fillRect(x, y, width, height);

                // Button border
                this.ctx.strokeStyle = this.theme.primary;
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(x, y, width, height);

                // Button text
                this.ctx.fillStyle = this.theme.primary;
                this.ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText(text, x + width / 2, y + height / 2);
            }

            render() {
                this.drawGradientBackground();
                this.drawGrid();
                this.drawHeader();
                this.drawDriftIndicator();
                this.drawFeatures();
                this.drawHeroText();

                // CTA Buttons
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                this.drawButton(centerX - 110, centerY + 110, 100, 40, 'Demo');
                this.drawButton(centerX + 10, centerY + 110, 100, 40, 'Docs');
            }

            updateDriftState(state, description) {
                this.driftState = state;
                this.driftDescription = description;
            }
        }

        // ============= VECTOR & HEMISPHERE =============
        var Vector;
        (function (Vector) {
            "use strict";
            var Vec3 = function (x, y, z) {
                this.x = x;
                this.y = y;
                this.z = z;
            };
            Vec3.prototype.rotateX = function (angle) {
                var y = this.y;
                var z = this.z;
                this.y = y * Math.cos(angle) - z * Math.sin(angle);
                this.z = z * Math.cos(angle) + y * Math.sin(angle);
                return this;
            };
            Vec3.prototype.rotateY = function (angle) {
                var x = this.x;
                var z = this.z;
                this.x = x * Math.cos(angle) - z * Math.sin(angle);
                this.z = z * Math.cos(angle) + x * Math.sin(angle);
                return this;
            };
            Vector["Vec3"] = Vec3;
        })(typeof Vector === "undefined" ? (Vector = {}) : Vector);

        var HemiSphere = function ({ origin, radius, detail }) {
            this.origin = origin || new Vector.Vec3(0, 0, 0);
            this.radius = radius || 50;
            this.vertices = [];
            this.detail = detail || 10;
            this.faces = [];
            this.init();
        };

        HemiSphere.prototype.init = function () {
            var vertices = this.vertices;
            var faces = this.faces;
            var radius = this.radius;
            var detail = this.detail;

            for (var i = 0; i < detail; i++) {
                var theta = (Math.PI * i) / detail;
                for (var j = 0; j < detail; j++) {
                    var phi = (Math.PI * j) / detail;
                    vertices.push(
                        radius * Math.sin(theta) * Math.cos(phi),
                        radius * Math.sin(theta) * Math.sin(phi),
                        radius * Math.cos(theta)
                    );
                }
            }

            for (var i = 0; i < detail - 1; i++) {
                for (var j = 0; j < detail - 1; j++) {
                    var a = i * detail + j;
                    var b = (i + 1) * detail + j;
                    var c = (i + 1) * detail + (j + 1);
                    var d = i * detail + (j + 1);
                    faces.push(a, b, c, a, c, d);
                }
            }
        };

        HemiSphere.prototype.drawWireframe = function (context, color, alpha) {
            var faces = this.faces;
            var vertices = this.vertices;
            var origin = this.origin;

            context.strokeStyle = color;
            context.lineWidth = 1;
            context.globalAlpha = alpha || 0.6;

            for (var i = 0; i < faces.length; i += 3) {
                var a = faces[i];
                var b = faces[i + 1];
                var c = faces[i + 2];

                var v1x = vertices[a * 3] + origin.x;
                var v1y = vertices[a * 3 + 1] + origin.y;
                var v2x = vertices[b * 3] + origin.x;
                var v2y = vertices[b * 3 + 1] + origin.y;
                var v3x = vertices[c * 3] + origin.x;
                var v3y = vertices[c * 3 + 1] + origin.y;

                context.beginPath();
                context.moveTo(v1x, v1y);
                context.lineTo(v2x, v2y);
                context.lineTo(v3x, v3y);
                context.lineTo(v1x, v1y);
                context.stroke();
            }

            context.globalAlpha = 1;
        };

        HemiSphere.prototype.rotateX = function (angle) {
            var vertices = this.vertices;
            for (var i = 0; i < vertices.length; i += 3) {
                var y = vertices[i + 1];
                var z = vertices[i + 2];
                vertices[i + 1] = y * Math.cos(angle) - z * Math.sin(angle);
                vertices[i + 2] = z * Math.cos(angle) + y * Math.sin(angle);
            }
        };

        HemiSphere.prototype.rotateY = function (angle) {
            var vertices = this.vertices;
            for (var i = 0; i < vertices.length; i += 3) {
                var x = vertices[i];
                var z = vertices[i + 2];
                vertices[i] = x * Math.cos(angle) - z * Math.sin(angle);
                vertices[i + 2] = z * Math.cos(angle) + x * Math.sin(angle);
            }
        };

        // ============= INITIALIZATION =============
        const uiRenderer = new CanvasUIRenderer(ctx, 'redYellow');
        const sphere = new HemiSphere({
            radius: 120,
            origin: new Vector.Vec3(canvas.width / 2, canvas.height / 2, 0),
            detail: 12
        });

        const driftStates = [
            { state: 'RED', desc: 'Moving away from observer' },
            { state: 'ORANGE', desc: 'Static / no displacement' },
            { state: 'YELLOW', desc: 'Orthogonal movement (~90°)' },
            { state: 'GREEN', desc: 'Moving toward observer' }
        ];

        let driftIndex = 0;
        let time = 0;

        // ============= ANIMATION LOOP =============
        function animate() {
            time = Date.now();

            // Render UI first (background)
            if (showUI) {
                uiRenderer.render();
            } else {
                ctx.fillStyle = '#0f0f1f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Rotate and draw sphere on top
            sphere.rotateY(0.002);
            sphere.rotateX(0.001);
            sphere.drawWireframe(ctx, themes[currentTheme].primary, 0.5);

            // Update drift state every 2 seconds
            if (Math.floor(time / 2000) !== driftIndex) {
                driftIndex = Math.floor(time / 2000) % driftStates.length;
                const current = driftStates[driftIndex];
                uiRenderer.updateDriftState(current.state, current.desc);
            }

            // Update FPS counter
            frameCount++;
            const currentTime = Date.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                document.getElementById('fpsCounter').textContent = fps;
                frameCount = 0;
                lastTime = currentTime;
            }

            requestAnimationFrame(animate);
        }

        animate();

        // ============= CONTROLS =============
        function switchTheme(themeName) {
            currentTheme = themeName;
            uiRenderer.setTheme(themeName);

            // Update button states
            document.querySelectorAll('.control-btn').forEach((btn, i) => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update label
            const labels = {
                redYellow: 'Red/Yellow',
                greenYellow: 'Green/Yellow',
                blueYellow: 'Blue/Yellow'
            };
            document.getElementById('themeLabel').textContent = labels[themeName];
        }

        function captureFrame() {
            const imageData = canvas.toDataURL('image/png');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');

            // Create download link
            const link = document.createElement('a');
            link.href = imageData;
            link.download = `mmuko-fluid-${timestamp}.png`;
            link.click();

            console.log('Frame captured:', timestamp);
            alert('Frame captured and downloaded!');
        }

        function toggleUI() {
            showUI = !showUI;
            event.target.classList.toggle('active');
        }

        // Update resolution label
        function updateResLabel() {
            document.getElementById('resLabel').textContent = `${canvas.width}x${canvas.height}`;
        }
        updateResLabel();
        window.addEventListener('resize', updateResLabel);

        // Expose for debugging
        window.mmuko = {
            renderer: uiRenderer,
            sphere: sphere,
            captureFrame: () => canvas.toDataURL('image/png')
        };
    </script>
</body>
</html>
